name: "Debug PR Permissions"

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: "Close diagnostic PR and delete diagnostic branch after the test"
        type: boolean
        default: false

jobs:
  debug-pr-permissions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - name: Print workflow identity
        run: |
          set -euo pipefail
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Run id: ${GITHUB_RUN_ID}"
          echo "Event: ${GITHUB_EVENT_NAME}"
          echo "Requested job permissions: contents=write, pull-requests=write, issues=write, actions=write"

      - name: Push diagnostic branch with GITHUB_TOKEN
        run: |
          set -euo pipefail
          branch="ci-pr-permission-test-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          printf 'PR permission diagnostic run %s\n' "${GITHUB_RUN_ID}" > .github-pr-permission-test.txt
          git add .github-pr-permission-test.txt
          git commit -m "test: github actions pr permission"
          git push origin "$branch"
          echo "DIAGNOSTIC_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Create diagnostic PR
        env:
          GH_TOKEN: ${{ secrets.CI_PR_TOKEN || github.token }}
          CI_PR_TOKEN: ${{ secrets.CI_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${CI_PR_TOKEN:-}" ]; then
            echo "Testing PR creation with CI_PR_TOKEN through gh pr create."
          else
            echo "Testing PR creation with GITHUB_TOKEN through gh pr create."
          fi
          gh pr create \
            --base main \
            --head "${GITHUB_REPOSITORY_OWNER}:${DIAGNOSTIC_BRANCH}" \
            --title "Diagnostic PR permission test" \
            --body "This PR was created by the Debug PR Permissions workflow using only the built-in GITHUB_TOKEN."
          pr_number="$(gh pr view "$DIAGNOSTIC_BRANCH" --json number --jq .number)"
          echo "DIAGNOSTIC_PR_NUMBER=$pr_number" >> "$GITHUB_ENV"
          echo "Created diagnostic PR #$pr_number"

      - name: Cleanup diagnostic PR and branch
        if: ${{ always() && inputs.cleanup }}
        env:
          GH_TOKEN: ${{ secrets.CI_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if [ -n "${DIAGNOSTIC_PR_NUMBER:-}" ]; then
            echo "Closing diagnostic PR #${DIAGNOSTIC_PR_NUMBER}."
            gh pr close "${DIAGNOSTIC_PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --comment "Closing diagnostic PR permission test." || true
          fi

          if [ -n "${DIAGNOSTIC_BRANCH:-}" ]; then
            echo "Deleting diagnostic branch ${DIAGNOSTIC_BRANCH}."
            git push origin --delete "${DIAGNOSTIC_BRANCH}" || true
          fi
