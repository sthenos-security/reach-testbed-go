name: "Debug PR Permissions"

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: "Close diagnostic PR and delete diagnostic branch after the test"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  debug-pr-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - name: Print workflow identity and repo permission policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Run id: ${GITHUB_RUN_ID}"
          echo "Event: ${GITHUB_EVENT_NAME}"
          echo "Requested job permissions: contents=write, pull-requests=write, actions=read"
          echo "Repository Actions workflow permission policy:"
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/permissions/workflow"

      - name: Push diagnostic branch with GITHUB_TOKEN
        run: |
          set -euo pipefail
          branch="ci-pr-permission-test-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          printf 'PR permission diagnostic run %s\n' "${GITHUB_RUN_ID}" > .github-pr-permission-test.txt
          git add .github-pr-permission-test.txt
          git commit -m "test: github actions pr permission"
          git push origin "$branch"
          echo "DIAGNOSTIC_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Create diagnostic PR with GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              "title": "Diagnostic PR permission test",
              "head": os.environ["DIAGNOSTIC_BRANCH"],
              "base": "main",
              "body": "This PR was created by the Debug PR Permissions workflow using only the built-in GITHUB_TOKEN.",
              "maintainer_can_modify": True,
          }))
          PY
          )"

          response="$(mktemp)"
          status="$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls" \
            --data "$payload")"
          echo "PR create HTTP status: $status"
          cat "$response"
          if [ "$status" = "201" ]; then
            pr_number="$(python3 - "$response" <<'PY'
            import json
            import sys
            print(json.load(open(sys.argv[1], encoding="utf-8"))["number"])
            PY
            )"
            echo "DIAGNOSTIC_PR_NUMBER=$pr_number" >> "$GITHUB_ENV"
            echo "Created diagnostic PR #$pr_number"
          fi
          test "$status" = "201"

      - name: Cleanup diagnostic PR and branch
        if: ${{ always() && inputs.cleanup }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${DIAGNOSTIC_PR_NUMBER:-}" ]; then
            echo "Closing diagnostic PR #${DIAGNOSTIC_PR_NUMBER}."
            gh pr close "${DIAGNOSTIC_PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --comment "Closing diagnostic PR permission test." || true
          fi

          if [ -n "${DIAGNOSTIC_BRANCH:-}" ]; then
            echo "Deleting diagnostic branch ${DIAGNOSTIC_BRANCH}."
            git push origin --delete "${DIAGNOSTIC_BRANCH}" || true
          fi
