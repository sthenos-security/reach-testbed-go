name: "Debug PR Permissions"

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: "Close diagnostic PR and delete diagnostic branch after the test"
        type: boolean
        default: false

jobs:
  debug-pr-permissions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}

      - name: Print workflow identity
        run: |
          set -euo pipefail
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Run id: ${GITHUB_RUN_ID}"
          echo "Event: ${GITHUB_EVENT_NAME}"
          echo "Requested job permissions: contents=write, pull-requests=write, issues=write, actions=write"

      - name: Push diagnostic branch with GITHUB_TOKEN
        run: |
          set -euo pipefail
          branch="ci-pr-permission-test-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          printf 'PR permission diagnostic run %s\n' "${GITHUB_RUN_ID}" > .github-pr-permission-test.txt
          git add .github-pr-permission-test.txt
          git commit -m "test: github actions pr permission"
          git push origin "$branch"
          echo "DIAGNOSTIC_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Create diagnostic PR
        env:
          GH_TOKEN: ${{ secrets.CI_PR_TOKEN }}
          CI_PR_TOKEN: ${{ secrets.CI_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::CI_PR_TOKEN is not configured."
            exit 1
          fi
          if [ -n "${CI_PR_TOKEN:-}" ]; then
            echo "Testing PR creation with CI_PR_TOKEN through gh pr create."
            echo "CI_PR_TOKEN identity:"
            gh api user --jq '{login: .login, type: .type}'
            echo "CI_PR_TOKEN repository permissions:"
            gh api "repos/${GITHUB_REPOSITORY}" --jq '{permissions: .permissions, role_name: .role_name}'
          else
            echo "Testing PR creation with GITHUB_TOKEN through gh pr create."
          fi
          set +e
          pr_output="$(gh pr create \
            --base main \
            --head "${GITHUB_REPOSITORY_OWNER}:${DIAGNOSTIC_BRANCH}" \
            --title "Diagnostic PR permission test" \
            --body "This PR was created by the Debug PR Permissions workflow using the configured PR token." 2>&1)"
          pr_status="$?"
          set -e

          if [ "$pr_status" -ne 0 ]; then
            echo "gh pr create failed; trying REST create-pull-request fallback."
            printf '%s\n' "$pr_output"
            payload="$(python3 -c 'import json, os; print(json.dumps({"title": "Diagnostic PR permission test", "head": os.environ["GITHUB_REPOSITORY_OWNER"] + ":" + os.environ["DIAGNOSTIC_BRANCH"], "base": "main", "body": "This PR was created by the Debug PR Permissions workflow using the REST fallback."}))')"
            response="$(mktemp)"
            status="$(curl -sS -D "$response.headers" -o "$response" -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls" \
              --data "$payload")"
            echo "REST PR create HTTP status: $status"
            grep -i '^x-accepted-github-permissions:' "$response.headers" || true
            cat "$response"
            test "$status" = "201"
            pr_number="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["number"])' "$response")"
          else
            printf '%s\n' "$pr_output"
            pr_number="$(gh pr view "$DIAGNOSTIC_BRANCH" --json number --jq .number)"
          fi
          echo "DIAGNOSTIC_PR_NUMBER=$pr_number" >> "$GITHUB_ENV"
          echo "Created diagnostic PR #$pr_number"

      - name: Cleanup diagnostic PR and branch
        if: ${{ always() && inputs.cleanup }}
        env:
          GH_TOKEN: ${{ secrets.CI_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if [ -n "${DIAGNOSTIC_PR_NUMBER:-}" ]; then
            echo "Closing diagnostic PR #${DIAGNOSTIC_PR_NUMBER}."
            gh pr close "${DIAGNOSTIC_PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --comment "Closing diagnostic PR permission test." || true
          fi

          if [ -n "${DIAGNOSTIC_BRANCH:-}" ]; then
            echo "Deleting diagnostic branch ${DIAGNOSTIC_BRANCH}."
            git push origin --delete "${DIAGNOSTIC_BRANCH}" || true
          fi
