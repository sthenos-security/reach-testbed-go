name: Reachable Remediation Template

on:
  workflow_dispatch:
    inputs:
      remediate:
        description: "Kill switch: allow CI to change code and open a remediation PR"
        type: boolean
        default: false
      rescan_only:
        description: "Only prove the selected branch; do not create or edit a branch"
        type: boolean
        default: false
      target_branch:
        description: "Base branch, or existing remediation branch for rescan_only"
        type: string
        default: main
      remediation_mode:
        description: "One-key remediation mode"
        type: choice
        default: codex-openai
        options:
          - codex-openai
          - claude-anthropic
          - opencode
          - custom
      opencode_model:
        description: "OpenCode model slug, when remediation_mode=opencode"
        type: string
        default: opencode/deepseek-v4-flash-free
      prompt_profile:
        description: "Reachable remediation bundling profile"
        type: choice
        default: balanced
        options:
          - safe
          - balanced
          - aggressive
          - release
          - nightly
      signal_types:
        description: "Comma-separated signal families, or all"
        type: string
        default: all
      max_batches:
        description: "Maximum serialized remediation batches"
        type: number
        default: 1
      test_command:
        description: "Repository test/build command"
        type: string
        default: go test ./...
      scan_extra_flags:
        description: "Extra reachctl scan flags"
        type: string
        default: ""
      custom_agent_install_command:
        description: "Optional install command when agent=custom"
        type: string
        default: ""
      custom_agent_run_command:
        description: "Required run command when agent=custom; receives PROMPT_PATH"
        type: string
        default: ""
      create_pr:
        description: "Open a pull request after successful remediation"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  reachable-remediate:
    runs-on: ubuntu-latest
    env:
      REACHABLE_DIST_REPO: ${{ vars.REACHABLE_DIST_REPO || 'sthenos-security/reach-dist' }}
      REACHABLE_VERSION: ${{ vars.REACHABLE_VERSION || '' }}
      REACHABLE_REMEDIATE_ENABLED: ${{ inputs.remediate }}
      REACHABLE_RESCAN_ONLY: ${{ inputs.rescan_only }}
      REACHABLE_REMEDIATION_MODE: ${{ inputs.remediation_mode }}
      REACHABLE_AGENT: ""
      REACHABLE_PROMPT_AGENT: ""
      REACHABLE_LLM_PROVIDER: auto
      REACHABLE_PROMPT_PROFILE: ${{ inputs.prompt_profile }}
      REACHABLE_SIGNAL_TYPES: ${{ inputs.signal_types }}
      REACHABLE_MAX_BATCHES: ${{ inputs.max_batches }}
      REACHABLE_TEST_COMMAND: ${{ inputs.test_command }}
      REACHABLE_SCAN_EXTRA_FLAGS: ${{ inputs.scan_extra_flags }}
      REACHABLE_CUSTOM_AGENT_INSTALL_COMMAND: ${{ inputs.custom_agent_install_command }}
      REACHABLE_AGENT_RUN_COMMAND: ${{ inputs.custom_agent_run_command }}
      OPENCODE_MODEL: ${{ inputs.opencode_model }}

      # Reachable + GitHub integration tokens.
      REACHABLE_API_KEY: ${{ secrets.REACHABLE_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      MCP_GITHUB_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN }}

      # Reachable scan/enrichment LLM providers.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      # Private/local model support for enterprise runners.
      REACHABLE_PRIVATE_LLM_MODEL: ${{ vars.REACHABLE_PRIVATE_LLM_MODEL }}
      REACHABLE_PRIVATE_LLM_API_KEY: ${{ secrets.REACHABLE_PRIVATE_LLM_API_KEY }}
      REACHABLE_PRIVATE_LLM_API_KEY_CREDENTIAL: ${{ secrets.REACHABLE_PRIVATE_LLM_API_KEY_CREDENTIAL }}
      ENZO_LOCAL_API_KEY: ${{ secrets.ENZO_LOCAL_API_KEY }}
      ENZO_LOCAL_MODEL: ${{ vars.ENZO_LOCAL_MODEL }}

      # Coding-agent auth. Agents may also use their own persisted runner login.
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCODE_AUTH: ${{ secrets.OPENCODE_AUTH }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - uses: actions/setup-go@v5
        if: ${{ hashFiles('go.mod') != '' }}
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        with:
          node-version: "22"

      - name: Prepare Reachable cache directories
        run: |
          mkdir -p "$HOME/.reachable"

      - name: Restore Reachable cache
        id: reachable-cache
        uses: actions/cache@v4
        with:
          path: ~/.reachable
          key: reachable-${{ runner.os }}-${{ github.repository_id }}-${{ env.REACHABLE_VERSION }}-${{ hashFiles('**/go.sum', '**/go.mod', '**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock', '**/requirements*.txt', '**/poetry.lock', '**/uv.lock', '**/Pipfile.lock', '**/Cargo.lock', '**/Gemfile.lock', '**/pom.xml', '**/build.gradle*', '**/*.csproj') }}
          restore-keys: |
            reachable-${{ runner.os }}-${{ github.repository_id }}-${{ env.REACHABLE_VERSION }}-
            reachable-${{ runner.os }}-${{ github.repository_id }}-
            reachable-${{ runner.os }}-

      - name: Reachable cache status
        run: |
          echo "Repository telemetry:"
          echo "  tracked files: $(git ls-files | wc -l | xargs)"
          echo "  checkout size: $(du -sh . | awk '{print $1}')"
          if [ "${{ steps.reachable-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Reachable cache active: warm cache restored from GitHub Actions cache."
          else
            echo "Reachable cache active: cold start; this run will populate GitHub Actions cache."
          fi
          du -sh "$HOME/.reachable" 2>/dev/null || true

      - name: Normalize provider secrets
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -n "${CODEX_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY=$CODEX_API_KEY" >> "$GITHUB_ENV"
            echo "Mapped CODEX_API_KEY alias to OPENAI_API_KEY for Codex/OpenAI mode."
          fi
          if [ -z "${GROQ_API_KEY:-}" ] && [ -n "${GROK_API_KEY:-}" ]; then
            echo "GROQ_API_KEY=$GROK_API_KEY" >> "$GITHUB_ENV"
            echo "Mapped legacy GROK_API_KEY secret to GROQ_API_KEY for Reachable."
          fi

      - name: Resolve remediation mode
        run: |
          set -euo pipefail
          mode="${REACHABLE_REMEDIATION_MODE:-codex-openai}"
          require_auth=0
          if [ "${REACHABLE_REMEDIATE_ENABLED:-false}" = "true" ] && [ "${REACHABLE_RESCAN_ONLY:-false}" != "true" ]; then
            require_auth=1
          fi

          case "$mode" in
            codex-openai)
              agent="codex"
              prompt_agent="codex"
              provider="openai"
              if [ "$require_auth" -eq 1 ] && [ -z "${OPENAI_API_KEY:-}" ]; then
                echo "remediation_mode=codex-openai requires one GitHub secret: OPENAI_API_KEY." >&2
                exit 2
              fi
              ;;
            claude-anthropic)
              agent="claude"
              prompt_agent="claude"
              provider="claude"
              if [ "$require_auth" -eq 1 ] && [ -z "${ANTHROPIC_API_KEY:-}" ]; then
                echo "remediation_mode=claude-anthropic requires one GitHub secret: ANTHROPIC_API_KEY." >&2
                exit 2
              fi
              ;;
            opencode)
              agent="opencode"
              prompt_agent="opencode"
              provider="auto"
              if [ "$require_auth" -eq 1 ] && [ -z "${OPENCODE_AUTH:-}" ]; then
                echo "remediation_mode=opencode selected without OPENCODE_AUTH; continuing because some OpenCode models support unauthenticated CI use." >&2
              fi
              ;;
            custom)
              agent="custom"
              prompt_agent="generic"
              provider="auto"
              if [ "$require_auth" -eq 1 ] && [ -z "${REACHABLE_AGENT_RUN_COMMAND:-}" ]; then
                echo "remediation_mode=custom requires custom_agent_run_command." >&2
                exit 2
              fi
              ;;
            *)
              echo "unsupported remediation_mode: $mode" >&2
              exit 2
              ;;
          esac

          {
            echo "REACHABLE_AGENT=$agent"
            echo "REACHABLE_PROMPT_AGENT=$prompt_agent"
            echo "REACHABLE_LLM_PROVIDER=$provider"
          } >> "$GITHUB_ENV"

          echo "Reachable remediation mode: $mode"
          echo "  coding agent: $agent"
          echo "  prompt flavor: $prompt_agent"
          echo "  Reachable AI provider: $provider"

      - name: Install Reachable
        run: |
          set -euo pipefail
          if command -v reachctl >/dev/null 2>&1; then
            reachctl --version
          else
            install_script="${RUNNER_TEMP:-/tmp}/reachable-install.sh"
            installer_url="${REACHABLE_INSTALL_URL:-https://raw.githubusercontent.com/${REACHABLE_DIST_REPO}/main/install.sh}"
            install_args=()
            if [ -n "$REACHABLE_VERSION" ]; then
              install_args+=(--version "$REACHABLE_VERSION")
            fi
            curl -fsSL "$installer_url" -o "$install_script"
            bash "$install_script" "${install_args[@]}"
            echo "$HOME/.reachable/venv/bin" >> "$GITHUB_PATH"
            echo "$HOME/.reachable/tools/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
            reachctl version
          fi

      - name: Reachable LOC telemetry
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          reachctl loc .

      - name: Baseline scan
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          mkdir -p .reachable/ci-artifacts
          scan_start="$(date +%s)"
          provider_args=()
          if [ "$REACHABLE_LLM_PROVIDER" != "auto" ]; then
            provider_args+=(--ai-provider "$REACHABLE_LLM_PROVIDER")
          fi
          # shellcheck disable=SC2206
          extra_args=($REACHABLE_SCAN_EXTRA_FLAGS)
          reachctl scan . --ci --sarif .reachable/ci-artifacts/reachable.sarif "${provider_args[@]}" "${extra_args[@]}"
          scan_end="$(date +%s)"
          echo "Reachable baseline scan duration: $((scan_end - scan_start))s"
          du -sh .reachable/ci-artifacts 2>/dev/null || true

      - name: Reachable cache populated
        if: always()
        run: |
          echo "Reachable cache active: post-scan cache/scans/tool state below."
          du -sh "$HOME/.reachable" 2>/dev/null || true

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reachable-baseline
          if-no-files-found: ignore
          path: |
            .reachable/ci-artifacts/**
            .reachable/remediation-bundle/**

      - name: Prove without remediation
        if: ${{ !inputs.remediate || inputs.rescan_only }}
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          if [ -n "$REACHABLE_TEST_COMMAND" ]; then
            bash -lc "$REACHABLE_TEST_COMMAND"
          fi
          latest_scan_path="$(python -c "from pathlib import Path; root=Path.home()/'.reachable'/'scans'; candidates=[p for p in root.glob('*/*/20*') if p.is_dir()]; print(max(candidates, key=lambda p: p.stat().st_mtime) if candidates else '')")"
          if [ -z "$latest_scan_path" ]; then
            echo "No Reachable scan session found under ~/.reachable/scans." >&2
            exit 2
          fi
          echo "Reachable latest scan path: $latest_scan_path"
          reachctl audit --scan-path "$latest_scan_path" --summary
          reachctl integrity --scan-path "$latest_scan_path"

      - name: Create remediation branch
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          BRANCH="reachable-remediate-${GITHUB_RUN_ID}"
          git config user.name "reachable-remediation-bot"
          git config user.email "security@sthenos.com"
          git switch -c "$BRANCH"
          echo "REACHABLE_REMEDIATION_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Install selected coding agent
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          case "$REACHABLE_AGENT" in
            claude)
              npm install -g @anthropic-ai/claude-code
              claude --version
              ;;
            codex)
              npm install -g @openai/codex
              codex --version
              ;;
            opencode)
              npm install -g opencode-ai
              opencode --version
              ;;
            custom)
              if [ -n "$REACHABLE_CUSTOM_AGENT_INSTALL_COMMAND" ]; then
                bash -lc "$REACHABLE_CUSTOM_AGENT_INSTALL_COMMAND"
              fi
              ;;
            *)
              echo "unsupported agent: $REACHABLE_AGENT" >&2
              exit 2
              ;;
          esac

      - name: Remediate in bounded batches
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          set -o pipefail
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          max_batches="${REACHABLE_MAX_BATCHES:-1}"
          if [ "$max_batches" -lt 1 ]; then
            echo "REACHABLE_MAX_BATCHES must be >= 1" >&2
            exit 2
          fi

          prompt_agent="$REACHABLE_PROMPT_AGENT"
          if [ "$prompt_agent" = "auto" ]; then
            case "$REACHABLE_AGENT" in
              claude|codex|opencode) prompt_agent="$REACHABLE_AGENT" ;;
              *) prompt_agent="generic" ;;
            esac
          fi

          provider_args=()
          if [ "$REACHABLE_LLM_PROVIDER" != "auto" ]; then
            provider_args+=(--ai-provider "$REACHABLE_LLM_PROVIDER")
          fi
          # shellcheck disable=SC2206
          extra_args=($REACHABLE_SCAN_EXTRA_FLAGS)

          for batch in $(seq 1 "$max_batches"); do
            echo "== Reachable remediation batch $batch/$max_batches =="
            rm -rf .reachable/remediation-bundle

            signal_args=()
            if [ "$REACHABLE_SIGNAL_TYPES" = "all" ]; then
              signal_args+=(--all)
            else
              IFS=',' read -ra families <<< "$REACHABLE_SIGNAL_TYPES"
              for family in "${families[@]}"; do
                family="$(echo "$family" | xargs)"
                if [ -n "$family" ]; then
                  signal_args+=(--signal-type "$family")
                fi
              done
            fi

            reachctl remediate \
              --workspace . \
              --agent "$prompt_agent" \
              --branch-name "$REACHABLE_REMEDIATION_BRANCH" \
              --profile "$REACHABLE_PROMPT_PROFILE" \
              "${signal_args[@]}"

            selected_rules="$(python -c "import json; from pathlib import Path; p=Path('.reachable/remediation-bundle/bundle.json'); d=json.loads(p.read_text(encoding='utf-8')) if p.exists() else {}; print(int(d.get('selected_rule_count') or len(d.get('selected_rules') or [])))")"
            if [ "$selected_rules" -le 0 ]; then
              echo "Reachable generated no remediation rules; stopping."
              break
            fi

            agent_log=".reachable/ci-artifacts/agent-batch-${batch}.log"
            set +e
            ./ci/run-agent.sh "$REACHABLE_AGENT" .reachable/remediation-bundle/prompt.md 2>&1 \
              | sed -u 's/##\[/# [/g' \
              | tee "$agent_log"
            agent_status="${PIPESTATUS[0]}"
            set -e
            if [ "$agent_status" -ne 0 ]; then
              echo "Coding agent failed for batch $batch with exit code $agent_status." >&2
              exit "$agent_status"
            fi

            if [ -n "$REACHABLE_TEST_COMMAND" ]; then
              test_start="$(date +%s)"
              bash -lc "$REACHABLE_TEST_COMMAND"
              test_end="$(date +%s)"
              echo "Repository test duration: $((test_end - test_start))s"
            fi

            batch_scan_start="$(date +%s)"
            reachctl scan . --ci --sarif ".reachable/ci-artifacts/reachable-after-batch-${batch}.sarif" "${provider_args[@]}" "${extra_args[@]}"
            batch_scan_end="$(date +%s)"
            echo "Reachable proof scan duration for batch $batch: $((batch_scan_end - batch_scan_start))s"
            latest_scan_path="$(python -c "from pathlib import Path; root=Path.home()/'.reachable'/'scans'; candidates=[p for p in root.glob('*/*/20*') if p.is_dir()]; print(max(candidates, key=lambda p: p.stat().st_mtime) if candidates else '')")"
            if [ -z "$latest_scan_path" ]; then
              echo "No Reachable scan session found under ~/.reachable/scans." >&2
              exit 2
            fi
            echo "Reachable latest scan path: $latest_scan_path"
            reachctl audit --scan-path "$latest_scan_path" --summary
            reachctl integrity --scan-path "$latest_scan_path"

            if [ -z "$(git status --porcelain -- . ':(exclude).reachable' ':(exclude).reachable/**' ':(exclude)reachable*.sarif')" ]; then
              echo "No workspace changes after batch $batch; stopping."
              break
            fi
          done

      - name: Commit remediation branch
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          stage_list="${RUNNER_TEMP:-/tmp}/reachable-stage-paths"
          python - "$stage_list" <<'PY'
          import fnmatch
          import subprocess
          import sys

          stage_list = sys.argv[1]

          def split0(cmd):
              raw = subprocess.check_output(cmd)
              return [p.decode("utf-8", "surrogateescape") for p in raw.split(b"\0") if p]

          def keep(path):
              return not (
                  path == ".reachable"
                  or path.startswith(".reachable/")
                  or fnmatch.fnmatch(path, "reachable*.sarif")
                  or fnmatch.fnmatch(path.rsplit("/", 1)[-1], "reachable*.sarif")
              )

          paths = set()
          for path in split0(["git", "diff", "--name-only", "-z", "--"]):
              if keep(path):
                  paths.add(path)
          for path in split0(["git", "ls-files", "--others", "--exclude-standard", "-z", "--"]):
              if keep(path):
                  paths.add(path)

          ordered = sorted(paths)
          for path in ordered:
              print(path, file=sys.stderr)
          with open(stage_list, "wb") as fh:
              if ordered:
                  fh.write(b"\0".join(p.encode("utf-8", "surrogateescape") for p in ordered) + b"\0")
          PY
          if [ ! -s "$stage_list" ]; then
            echo "No remediation changes produced."
            exit 1
          fi
          echo "Remediation changes listed above."
          git add -A --pathspec-from-file="$stage_list" --pathspec-file-nul
          if git diff --cached --quiet; then
            echo "No committable remediation changes after exclusions."
            exit 1
          fi
          git commit -m "fix: reachable remediation batch"
          git push origin "$REACHABLE_REMEDIATION_BRANCH"

      - name: Open remediation PR
        if: ${{ inputs.remediate && !inputs.rescan_only && inputs.create_pr }}
        run: |
          gh pr create \
            --base "${{ inputs.target_branch }}" \
            --head "$REACHABLE_REMEDIATION_BRANCH" \
            --title "Reachable remediation demo" \
            --body "Automated Reachable remediation proof branch. CI scanned, generated a database-backed prompt bundle, ran the selected coding agent, tested, rescanned, audited, and verified integrity."

      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reachable-remediation-artifacts
          if-no-files-found: ignore
          path: |
            .reachable/ci-artifacts/**
            .reachable/remediation-bundle/**
            .reachable/vibe-scenarios/workspace-remediation/**
