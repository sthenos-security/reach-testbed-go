name: "Run Demo"

on:
  workflow_dispatch:
    inputs:
      remediate:
        description: "Kill switch: allow CI to change code and open a remediation PR"
        type: boolean
        default: false
      rescan_only:
        description: "Only prove the selected branch; do not create or edit a branch"
        type: boolean
        default: false
      target_branch:
        description: "Base branch, or existing remediation branch for rescan_only"
        type: string
        default: main
      remediation_mode:
        description: "One-key remediation mode"
        type: choice
        default: codex-openai
        options:
          - codex-openai
          - claude-anthropic
      prompt_profile:
        description: "Reachable remediation bundling profile"
        type: choice
        default: balanced
        options:
          - safe
          - balanced
          - aggressive
          - release
          - nightly
      signal_types:
        description: "Comma-separated signal families, or all"
        type: string
        default: all
      max_batches:
        description: "Maximum serialized remediation batches"
        type: number
        default: 1
      rescan_strategy:
        description: "When to run Reachable proof rescans during remediation"
        type: choice
        default: final
        options:
          - final
          - each_batch
      scan_extra_flags:
        description: "Extra reachctl scan flags"
        type: string
        default: ""
      require_ai:
        description: "Fail early unless a Reachable scan/enrichment LLM key is configured"
        type: boolean
        default: true
      fresh_scan:
        description: "Start from an empty ~/.reachable cache for a clean evidence run"
        type: boolean
        default: false
      create_pr:
        description: "Open a pull request after successful remediation"
        type: boolean
        default: true
      run_project_tests:
        description: "Run the repository test command after agent edits before proof scans"
        type: boolean
        default: true
      project_test_command:
        description: "Repository test command for the post-agent safety gate"
        type: string
        default: "go test ./..."

permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read
  pages: write
  id-token: write

env:
  # Opt into GitHub's Node 24 JavaScript action runtime now so the demo does
  # not emit platform deprecation annotations during customer-facing runs.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Suppress Node runtime deprecation chatter from GitHub-owned JavaScript
  # actions so the demo log stays focused on Reachable evidence.
  NODE_OPTIONS: --no-deprecation

jobs:
  reachable-remediate:
    runs-on: ubuntu-latest
    env:
      REACHABLE_DIST_REPO: ${{ vars.REACHABLE_DIST_REPO || 'sthenos-security/reach-dist' }}
      REACHABLE_VERSION: ${{ vars.REACHABLE_VERSION || '' }}
      REACHABLE_REMEDIATE_ENABLED: ${{ inputs.remediate }}
      REACHABLE_RESCAN_ONLY: ${{ inputs.rescan_only }}
      REACHABLE_REMEDIATION_MODE: ${{ inputs.remediation_mode }}
      REACHABLE_AGENT: ""
      REACHABLE_PROMPT_AGENT: ""
      REACHABLE_LLM_PROVIDER: auto
      REACHABLE_PROMPT_PROFILE: ${{ inputs.prompt_profile }}
      REACHABLE_SIGNAL_TYPES: ${{ inputs.signal_types }}
      REACHABLE_MAX_BATCHES: ${{ inputs.max_batches }}
      REACHABLE_RESCAN_STRATEGY: ${{ inputs.rescan_strategy }}
      REACHABLE_SCAN_EXTRA_FLAGS: ${{ inputs.scan_extra_flags }}
      REACHABLE_REQUIRE_AI: ${{ inputs.require_ai }}
      REACHABLE_FRESH_SCAN: ${{ inputs.fresh_scan }}
      REACHABLE_CREATE_PR: ${{ inputs.create_pr }}
      REACHABLE_RUN_PROJECT_TESTS: ${{ inputs.run_project_tests }}
      REACHABLE_PROJECT_TEST_COMMAND: ${{ inputs.project_test_command }}
      REACHABLE_AGENT_LOG_DIR: .reachable/private-agent-logs

      # Reachable + GitHub integration tokens.
      REACHABLE_API_KEY: ${{ secrets.REACHABLE_API_KEY }}
      REACHABLE_GITHUB_TOKEN: ${{ secrets.REACHABLE_GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      MCP_GITHUB_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN }}

      # Reachable scan/enrichment LLM providers.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Coding-agent auth. Codex/Claude use the same provider key as Reachable.

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.REACHABLE_GITHUB_TOKEN || github.token }}

      - uses: actions/setup-go@v5
        if: ${{ hashFiles('go.mod') != '' }}
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        with:
          node-version: "22"

      - name: Smoke DB-backed demo verdict
        run: |
          python3 ci/smoke-db-remediation-proof.py

      - name: Prepare Reachable cache directories
        run: |
          if [ "${REACHABLE_FRESH_SCAN:-false}" = "true" ]; then
            echo "Reachable fresh scan requested: deleting ~/.reachable before restore/install."
            rm -rf "$HOME/.reachable"
          fi
          mkdir -p "$HOME/.reachable"

      - name: Restore Reachable cache
        if: ${{ !inputs.fresh_scan }}
        id: reachable-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.reachable
          key: reachable-${{ runner.os }}-${{ github.repository_id }}-${{ env.REACHABLE_VERSION }}-${{ hashFiles('**/go.sum', '**/go.mod', '**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock', '**/requirements*.txt', '**/poetry.lock', '**/uv.lock', '**/Pipfile.lock', '**/Cargo.lock', '**/Gemfile.lock', '**/pom.xml', '**/build.gradle*', '**/*.csproj') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            reachable-${{ runner.os }}-${{ github.repository_id }}-${{ env.REACHABLE_VERSION }}-${{ hashFiles('**/go.sum', '**/go.mod', '**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock', '**/requirements*.txt', '**/poetry.lock', '**/uv.lock', '**/Pipfile.lock', '**/Cargo.lock', '**/Gemfile.lock', '**/pom.xml', '**/build.gradle*', '**/*.csproj') }}-
            reachable-${{ runner.os }}-${{ github.repository_id }}-${{ env.REACHABLE_VERSION }}-
            reachable-${{ runner.os }}-${{ github.repository_id }}-
            reachable-${{ runner.os }}-

      - name: Reachable cache status
        env:
          REACHABLE_CACHE_PRIMARY_KEY: ${{ steps.reachable-cache.outputs.cache-primary-key }}
          REACHABLE_CACHE_MATCHED_KEY: ${{ steps.reachable-cache.outputs.cache-matched-key }}
          REACHABLE_CACHE_RESTORED: ${{ steps.reachable-cache.outputs.cache-matched-key != '' }}
          REACHABLE_CACHE_SOURCE: github-actions
        run: |
          echo "Repository telemetry:"
          echo "  tracked files: $(git ls-files | wc -l | xargs)"
          echo "  checkout size: $(du -sh . | awk '{print $1}')"
          echo "Reachable cache evidence:"
          echo "  fresh scan requested: ${REACHABLE_FRESH_SCAN:-false}"
          echo "  primary key: ${{ steps.reachable-cache.outputs.cache-primary-key }}"
          echo "  matched key: ${{ steps.reachable-cache.outputs.cache-matched-key }}"
          if [ "${REACHABLE_FRESH_SCAN:-false}" = "true" ]; then
            echo "  REACHABLE_CACHE_RESTORED=false"
            echo "  install mode: intentionally fresh ~/.reachable cache"
          elif [ -n "${{ steps.reachable-cache.outputs.cache-matched-key }}" ]; then
            echo "  REACHABLE_CACHE_RESTORED=true"
            echo "  install mode: overlay/upgrade existing ~/.reachable cache"
          else
            echo "  REACHABLE_CACHE_RESTORED=false"
            echo "  install mode: fresh ~/.reachable cache"
          fi
          echo "  cache size: $(du -sh "$HOME/.reachable" 2>/dev/null | awk '{print $1}' || echo 0)"
          echo "  cached repo.db count: $(find "$HOME/.reachable/scans" -name repo.db 2>/dev/null | wc -l | xargs)"
          python3 ci/reachable-cache-evidence.py before-install

      - name: Resolve remediation mode
        run: |
          set -euo pipefail
          mode="${REACHABLE_REMEDIATION_MODE:-codex-openai}"
          require_auth=0
          if [ "${REACHABLE_REMEDIATE_ENABLED:-false}" = "true" ] && [ "${REACHABLE_RESCAN_ONLY:-false}" != "true" ]; then
            require_auth=1
          fi

          case "$mode" in
            codex-openai)
              agent="codex"
              prompt_agent="codex"
              provider="openai"
              provider_label="openai"
              if [ "$require_auth" -eq 1 ] && [ -z "${OPENAI_API_KEY:-}" ]; then
                echo "remediation_mode=codex-openai requires one GitHub secret: OPENAI_API_KEY." >&2
                exit 2
              fi
              ;;
            claude-anthropic)
              agent="claude"
              prompt_agent="claude"
              # reachctl currently names the Anthropic provider flag "claude".
              provider="claude"
              provider_label="anthropic"
              if [ "$require_auth" -eq 1 ] && [ -z "${ANTHROPIC_API_KEY:-}" ]; then
                echo "remediation_mode=claude-anthropic requires one GitHub secret: ANTHROPIC_API_KEY." >&2
                exit 2
              fi
              ;;
            *)
              echo "unsupported remediation_mode: $mode" >&2
              exit 2
              ;;
          esac

          {
            echo "REACHABLE_AGENT=$agent"
            echo "REACHABLE_PROMPT_AGENT=$prompt_agent"
            echo "REACHABLE_LLM_PROVIDER=$provider"
            echo "REACHABLE_LLM_PROVIDER_LABEL=$provider_label"
          } >> "$GITHUB_ENV"

          echo "Reachable remediation mode: $mode"
          echo "  coding agent: $agent"
          echo "  prompt flavor: $prompt_agent"
          echo "  Reachable AI provider: $provider_label"

      - name: Validate CI credentials
        run: |
          set -euo pipefail
          has_openai=0
          has_anthropic=0
          [ -n "${OPENAI_API_KEY:-}" ] && has_openai=1
          [ -n "${ANTHROPIC_API_KEY:-}" ] && has_anthropic=1

          echo "Reachable CI credential preflight:"
          echo "  remediation mode: ${REACHABLE_REMEDIATION_MODE}"
          echo "  selected scan provider: ${REACHABLE_LLM_PROVIDER_LABEL:-$REACHABLE_LLM_PROVIDER}"
          echo "  built-in GITHUB_TOKEN: present"
          echo "  REACHABLE_GITHUB_TOKEN configured: $([ -n "${REACHABLE_GITHUB_TOKEN:-}" ] && echo yes || echo no)"
          echo "  MCP_GITHUB_TOKEN configured: $([ -n "${MCP_GITHUB_TOKEN:-}" ] && echo yes || echo no)"
          echo "  OPENAI_API_KEY configured: $([ "$has_openai" -eq 1 ] && echo yes || echo no)"
          echo "  ANTHROPIC_API_KEY configured: $([ "$has_anthropic" -eq 1 ] && echo yes || echo no)"

          if [ "${REACHABLE_REQUIRE_AI:-true}" = "true" ]; then
            case "${REACHABLE_REMEDIATION_MODE}" in
              codex-openai)
                if [ "$has_openai" -eq 0 ]; then
                  echo "remediation_mode=codex-openai requires one GitHub secret: OPENAI_API_KEY." >&2
                  exit 2
                fi
                ;;
              claude-anthropic)
                if [ "$has_anthropic" -eq 0 ]; then
                  echo "remediation_mode=claude-anthropic requires one GitHub secret: ANTHROPIC_API_KEY." >&2
                  exit 2
                fi
                ;;
            esac
          fi

      - name: Install Reachable
        env:
          REACHABLE_CACHE_PRIMARY_KEY: ${{ steps.reachable-cache.outputs.cache-primary-key }}
          REACHABLE_CACHE_MATCHED_KEY: ${{ steps.reachable-cache.outputs.cache-matched-key }}
          REACHABLE_CACHE_RESTORED: ${{ steps.reachable-cache.outputs.cache-matched-key != '' }}
          REACHABLE_CACHE_SOURCE: github-actions
        run: |
          set -euo pipefail
          echo "$HOME/.reachable/venv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.reachable/tools/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          install_script="${RUNNER_TEMP:-/tmp}/reachable-install.sh"
          installer_url="${REACHABLE_INSTALL_URL:-https://raw.githubusercontent.com/${REACHABLE_DIST_REPO}/main/install.sh}"
          install_args=(--update)
          if [ -n "$REACHABLE_VERSION" ]; then
            install_args+=(--version "$REACHABLE_VERSION")
          fi
          curl -fsSL "$installer_url" -o "$install_script"
          bash "$install_script" "${install_args[@]}"
          reachctl version
          python3 ci/reachable-cache-evidence.py after-install

      - name: Reachable LOC telemetry
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          reachctl loc .

      - name: Baseline scan
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          mkdir -p .reachable/ci-artifacts
          scan_start="$(date +%s)"
          provider_args=()
          if [ "$REACHABLE_LLM_PROVIDER" != "auto" ]; then
            provider_args+=(--ai-provider "$REACHABLE_LLM_PROVIDER")
          fi
          scan_branch="${GITHUB_REF_NAME:-main}"
          scan_commit="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          # shellcheck disable=SC2206
          extra_args=($REACHABLE_SCAN_EXTRA_FLAGS)
          reachctl scan . --ci --branch "$scan_branch" --commit "$scan_commit" --sarif .reachable/ci-artifacts/reachable.sarif "${provider_args[@]}" "${extra_args[@]}"
          scan_end="$(date +%s)"
          echo "Reachable baseline scan duration: $((scan_end - scan_start))s"
          report_label="baseline"
          if [ "${REACHABLE_RESCAN_ONLY:-false}" = "true" ]; then
            report_label="rescan-only"
          fi
          bash ci/collect-reachable-report.sh "$report_label" .reachable/ci-artifacts
          python ci/write-remediation-ledger.py .reachable/ci-artifacts
          du -sh .reachable/ci-artifacts 2>/dev/null || true

      - name: Reachable cache populated
        if: always()
        env:
          REACHABLE_CACHE_PRIMARY_KEY: ${{ steps.reachable-cache.outputs.cache-primary-key }}
          REACHABLE_CACHE_MATCHED_KEY: ${{ steps.reachable-cache.outputs.cache-matched-key }}
          REACHABLE_CACHE_RESTORED: ${{ steps.reachable-cache.outputs.cache-matched-key != '' }}
          REACHABLE_CACHE_SOURCE: github-actions
        run: |
          echo "Reachable cache evidence after scan/install:"
          echo "  cache size: $(du -sh "$HOME/.reachable" 2>/dev/null | awk '{print $1}' || echo 0)"
          echo "  repo.db count: $(find "$HOME/.reachable/scans" -name repo.db 2>/dev/null | wc -l | xargs)"
          echo "  scan session count: $(find "$HOME/.reachable/scans" -mindepth 3 -maxdepth 3 -type d -name '20*' 2>/dev/null | wc -l | xargs)"
          python3 ci/reachable-cache-evidence.py after-scan

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v5
        with:
          name: reachable-baseline
          if-no-files-found: ignore
          path: |
            .reachable/ci-artifacts/**

      - name: Prove without remediation
        if: ${{ !inputs.remediate || inputs.rescan_only }}
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          latest_scan_path="$(python -c "from pathlib import Path; root=Path.home()/'.reachable'/'scans'; candidates=[p for p in root.glob('*/*/20*') if p.is_dir()]; print(max(candidates, key=lambda p: p.stat().st_mtime) if candidates else '')")"
          if [ -z "$latest_scan_path" ]; then
            echo "No Reachable scan session found under ~/.reachable/scans." >&2
            exit 2
          fi
          echo "Reachable latest scan path: $latest_scan_path"
          reachctl audit --scan-path "$latest_scan_path" --summary
          reachctl integrity --scan-path "$latest_scan_path"

      - name: Gate rescan-only verification
        if: ${{ inputs.rescan_only }}
        run: |
          latest_scan_path="$(python -c "from pathlib import Path; root=Path.home()/'.reachable'/'scans'; candidates=[p for p in root.glob('*/*/20*') if p.is_dir()]; print(max(candidates, key=lambda p: p.stat().st_mtime) if candidates else '')")"
          if [ -z "$latest_scan_path" ]; then
            echo "Reachable rescan-only verification failed: no Reachable scan session found under ~/.reachable/scans." >&2
            exit 2
          fi
          echo "Reachable rescan-only DB verification target: $latest_scan_path"
          python3 ci/check-db-release-blockers.py \
            "$latest_scan_path" \
            .reachable/ci-artifacts/db-rescan-only-verdict.json

      - name: Create remediation branch
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          BRANCH="reachable-remediate-${GITHUB_RUN_ID}"
          git config user.name "reachable-remediation-bot"
          git config user.email "security@sthenos.com"
          git switch -c "$BRANCH"
          echo "REACHABLE_REMEDIATION_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Install selected coding agent
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          case "$REACHABLE_AGENT" in
            claude)
              npm install -g @anthropic-ai/claude-code
              claude --version
              ;;
            codex)
              npm install -g @openai/codex
              codex --version
              if [ -z "${OPENAI_API_KEY:-}" ]; then
                echo "OPENAI_API_KEY is required for codex-openai remediation." >&2
                exit 2
              fi
              printenv OPENAI_API_KEY | codex login --with-api-key
              ;;
            *)
              echo "unsupported agent: $REACHABLE_AGENT" >&2
              exit 2
              ;;
          esac

      - name: Remediate in bounded batches
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          set -o pipefail
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          max_batches="${REACHABLE_MAX_BATCHES:-1}"
          if [ "$max_batches" -lt 1 ]; then
            echo "REACHABLE_MAX_BATCHES must be >= 1" >&2
            exit 2
          fi
          if [ "${REACHABLE_RESCAN_STRATEGY:-final}" = "final" ] && [ "$max_batches" -gt 1 ]; then
            echo "rescan_strategy=final currently supports max_batches=1 because each batch is generated from the latest scan state." >&2
            echo "Use rescan_strategy=each_batch for serialized multi-batch remediation, or leave max_batches at 1 for the faster demo path." >&2
            exit 2
          fi

          prompt_agent="$REACHABLE_PROMPT_AGENT"
          if [ "$prompt_agent" = "auto" ]; then
            case "$REACHABLE_AGENT" in
              claude|codex) prompt_agent="$REACHABLE_AGENT" ;;
              *) prompt_agent="generic" ;;
            esac
          fi

          provider_args=()
          if [ "$REACHABLE_LLM_PROVIDER" != "auto" ]; then
            provider_args+=(--ai-provider "$REACHABLE_LLM_PROVIDER")
          fi
          # shellcheck disable=SC2206
          extra_args=($REACHABLE_SCAN_EXTRA_FLAGS)

          for batch in $(seq 1 "$max_batches"); do
            echo "== Reachable remediation batch $batch/$max_batches =="
            rm -rf .reachable/remediation-bundle

            signal_args=()
            if [ "$REACHABLE_SIGNAL_TYPES" = "all" ]; then
              signal_args+=(--all)
            else
              IFS=',' read -ra families <<< "$REACHABLE_SIGNAL_TYPES"
              for family in "${families[@]}"; do
                family="$(echo "$family" | xargs)"
                if [ -n "$family" ]; then
                  signal_args+=(--signal-type "$family")
                fi
              done
            fi

            set +e
            reachctl remediate \
              --workspace . \
              --agent "$prompt_agent" \
              --branch-name "$REACHABLE_REMEDIATION_BRANCH" \
              --profile "$REACHABLE_PROMPT_PROFILE" \
              "${signal_args[@]}"
            remediate_status="$?"
            set -e
            if [ "$remediate_status" -ne 0 ]; then
              echo "reachctl remediate exited with status ${remediate_status}; continuing only if a bundle was produced."
            fi
            if [ ! -f .reachable/remediation-bundle/bundle.json ]; then
              echo "ERROR: reachctl remediate did not produce .reachable/remediation-bundle/bundle.json." >&2
              exit "$remediate_status"
            fi

            selected_rules="$(python -c 'import json; from pathlib import Path; d=json.loads(Path(".reachable/remediation-bundle/bundle.json").read_text(encoding="utf-8")); rules=d.get("selected_rules") or d.get("rules") or []; raw=str(d.get("selected_rule_count")).strip(); print(int(raw) if raw.isdigit() else len(rules))')"
            echo "Reachable selected remediation rules: ${selected_rules}"
            if [ "$selected_rules" -le 0 ]; then
              echo "Reachable generated no remediation rules; stopping."
              break
            fi

            mkdir -p "${REACHABLE_AGENT_LOG_DIR:-.reachable/private-agent-logs}"
            agent_log="${REACHABLE_AGENT_LOG_DIR:-.reachable/private-agent-logs}/agent-batch-${batch}.log"
            set +e
            ./ci/run-agent.sh "$REACHABLE_AGENT" .reachable/remediation-bundle/prompt.md > "$agent_log" 2>&1
            agent_status="$?"
            set -e
            if [ "$agent_status" -ne 0 ]; then
              echo "Coding agent failed for batch $batch with exit code $agent_status." >&2
              echo "Sanitized agent CLI diagnostics:" >&2
              grep -Eai '(^error:|not found|unknown option|unexpected argument|permission|auth|api key|usage:|failed|invalid)' \
                "$agent_log" | tail -30 >&2 || true
              echo "Agent transcript is retained only in the private runner directory and is not uploaded." >&2
              exit "$agent_status"
            fi
            echo "Coding agent completed batch $batch; private agent log retained on runner only."

            if [ "${REACHABLE_RUN_PROJECT_TESTS:-true}" = "true" ]; then
              # The coding agent just edited the repository. Run the project's
              # own test suite before any proof scan or remediation branch push
              # so the demo proves the agent did not break normal app behavior.
              echo "Project test gate: verifying coding-agent edits before Reachable proof scan and branch push."
              echo "Running project tests after agent edits: ${REACHABLE_PROJECT_TEST_COMMAND:-go test ./...}"
              bash -lc "${REACHABLE_PROJECT_TEST_COMMAND:-go test ./...}"
            else
              echo "Skipping project tests after agent edits (run_project_tests=false)."
            fi

            if [ "${REACHABLE_RESCAN_STRATEGY:-final}" != "each_batch" ]; then
              echo "Reachable proof rescan deferred until final batch (rescan_strategy=${REACHABLE_RESCAN_STRATEGY:-final})."
              continue
            fi

            batch_scan_start="$(date +%s)"
            proof_commit="$(git rev-parse HEAD)"
            echo "Reachable proof scan target: branch=${REACHABLE_REMEDIATION_BRANCH} commit=${proof_commit}"
            reachctl scan . --ci --branch "$REACHABLE_REMEDIATION_BRANCH" --commit "$proof_commit" --sarif ".reachable/ci-artifacts/reachable-after-batch-${batch}.sarif" "${provider_args[@]}" "${extra_args[@]}"
            batch_scan_end="$(date +%s)"
            echo "Reachable proof scan duration for batch $batch: $((batch_scan_end - batch_scan_start))s"
            bash ci/collect-reachable-report.sh "after-batch-${batch}" .reachable/ci-artifacts
            python ci/write-remediation-ledger.py .reachable/ci-artifacts .reachable/remediation-bundle/bundle.json
            latest_scan_path="$(python -c "from pathlib import Path; root=Path.home()/'.reachable'/'scans'; candidates=[p for p in root.glob('*/*/20*') if p.is_dir()]; print(max(candidates, key=lambda p: p.stat().st_mtime) if candidates else '')")"
            if [ -z "$latest_scan_path" ]; then
              echo "No Reachable scan session found under ~/.reachable/scans." >&2
              exit 2
            fi
            echo "Reachable latest scan path: $latest_scan_path"
            reachctl audit --scan-path "$latest_scan_path" --summary
            reachctl integrity --scan-path "$latest_scan_path"

            if [ -z "$(git status --porcelain -- . ':(exclude).reachable' ':(exclude).reachable/**' ':(exclude)reachable*.sarif')" ]; then
              echo "No workspace changes after batch $batch; stopping."
              break
            fi
          done

          if [ "${REACHABLE_RESCAN_STRATEGY:-final}" != "each_batch" ]; then
            final_scan_start="$(date +%s)"
            proof_commit="$(git rev-parse HEAD)"
            echo "Reachable final proof scan target: branch=${REACHABLE_REMEDIATION_BRANCH} commit=${proof_commit}"
            reachctl scan . --ci --branch "$REACHABLE_REMEDIATION_BRANCH" --commit "$proof_commit" --sarif ".reachable/ci-artifacts/reachable-after-final.sarif" "${provider_args[@]}" "${extra_args[@]}"
            final_scan_end="$(date +%s)"
            echo "Reachable final proof scan duration: $((final_scan_end - final_scan_start))s"
            bash ci/collect-reachable-report.sh "after-final" .reachable/ci-artifacts
            python ci/write-remediation-ledger.py .reachable/ci-artifacts .reachable/remediation-bundle/bundle.json
            latest_scan_path="$(python -c "from pathlib import Path; root=Path.home()/'.reachable'/'scans'; candidates=[p for p in root.glob('*/*/20*') if p.is_dir()]; print(max(candidates, key=lambda p: p.stat().st_mtime) if candidates else '')")"
            if [ -z "$latest_scan_path" ]; then
              echo "No Reachable scan session found under ~/.reachable/scans." >&2
              exit 2
            fi
            echo "Reachable latest scan path: $latest_scan_path"
            reachctl audit --scan-path "$latest_scan_path" --summary
            reachctl integrity --scan-path "$latest_scan_path"
          fi

      - name: Gate Reachable remediation proof
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          # Demo verdict is DB-backed. SARIF is an export artifact and may
          # include defended compatibility rows; it is not the source of truth.
          python3 ci/check-db-remediation-proof.py .reachable/ci-artifacts

      - name: Commit remediation branch
        if: ${{ inputs.remediate && !inputs.rescan_only }}
        run: |
          stage_list="${RUNNER_TEMP:-/tmp}/reachable-stage-paths"
          python - "$stage_list" <<'PY'
          import fnmatch
          import subprocess
          import sys

          stage_list = sys.argv[1]

          def split0(cmd):
              raw = subprocess.check_output(cmd)
              return [p.decode("utf-8", "surrogateescape") for p in raw.split(b"\0") if p]

          def keep(path):
              return not (
                  path == ".reachable"
                  or path.startswith(".reachable/")
                  # Demo remediation branches must not carry workflow edits.
                  # GitHub blocks built-in app tokens from pushing workflow
                  # changes, and workflow changes are not part of the app fix.
                  or path == ".github/workflows"
                  or path.startswith(".github/workflows/")
                  or fnmatch.fnmatch(path, "reachable*.sarif")
                  or fnmatch.fnmatch(path.rsplit("/", 1)[-1], "reachable*.sarif")
              )

          paths = set()
          for path in split0(["git", "diff", "--name-only", "-z", "--"]):
              if keep(path):
                  paths.add(path)
          for path in split0(["git", "ls-files", "--others", "--exclude-standard", "-z", "--"]):
              if keep(path):
                  paths.add(path)

          ordered = sorted(paths)
          for path in ordered:
              print(path, file=sys.stderr)
          with open(stage_list, "wb") as fh:
              if ordered:
                  fh.write(b"\0".join(p.encode("utf-8", "surrogateescape") for p in ordered) + b"\0")
          PY
          if [ ! -s "$stage_list" ]; then
            echo "No remediation changes produced."
            exit 1
          fi
          echo "Remediation changes listed above."
          git add -A --pathspec-from-file="$stage_list" --pathspec-file-nul
          if git diff --cached --quiet; then
            echo "No committable remediation changes after exclusions."
            exit 1
          fi
          git commit -m "fix: reachable remediation batch"
          push_token="${REACHABLE_GITHUB_TOKEN:-${GH_TOKEN:-}}"
          if [ -n "$push_token" ]; then
            git remote set-url origin "https://x-access-token:${push_token}@github.com/${GITHUB_REPOSITORY}.git"
            echo "Pushing remediation branch with configured GitHub token."
          else
            echo "Pushing remediation branch with checkout credentials."
          fi
          git push origin "$REACHABLE_REMEDIATION_BRANCH"

      - name: Open remediation PR
        if: ${{ inputs.remediate && !inputs.rescan_only && inputs.create_pr }}
        run: |
          pr_token="${REACHABLE_GITHUB_TOKEN:-${MCP_GITHUB_TOKEN:-${GH_TOKEN:-}}}"
          if [ -z "$pr_token" ]; then
            echo "No GitHub token available for PR creation."
            echo "Remediation branch pushed: https://github.com/${GITHUB_REPOSITORY}/tree/${REACHABLE_REMEDIATION_BRANCH}"
            exit 0
          fi

          set +e
          pr_output="$(GH_TOKEN="$pr_token" gh pr create \
            --base "${{ inputs.target_branch }}" \
            --head "$REACHABLE_REMEDIATION_BRANCH" \
            --title "Reachable remediation demo" \
            --body-file .reachable/remediation-bundle/pr-body.md 2>&1)"
          pr_status="$?"
          set -e

          if [ "$pr_status" -ne 0 ]; then
            echo "::warning::Could not open remediation PR automatically."
            printf '%s\n' "$pr_output"
            echo "Remediation branch pushed: https://github.com/${GITHUB_REPOSITORY}/tree/${REACHABLE_REMEDIATION_BRANCH}"
            echo "To allow automatic PR creation, enable the repository Actions setting that lets GitHub Actions create pull requests, or set REACHABLE_GITHUB_TOKEN to a fine-grained token with Contents and Pull requests write permissions."
            exit 0
          fi

          printf '%s\n' "$pr_output"

      - name: Remove private remediation bundle
        if: always()
        run: |
          # The remediation bundle contains proprietary prompt/rule material.
          # It is only for the in-run agent handoff; Pages and public artifacts
          # must contain the sanitized ledger/report data, never prompt.md,
          # bundle.json, rules.json, or private agent transcripts.
          if command -v reachctl >/dev/null 2>&1; then
            reachctl remediate --workspace . --cleanup
          else
            echo "Reachable was not installed; skipping remediation bundle cleanup."
          fi
          if find .reachable/ci-artifacts \
              \( -name prompt.md -o -name bundle.json -o -name rules.json -o -path '*/ai-rules/*' \) \
              -print -quit | grep -q .; then
            echo "ERROR: private remediation bundle material was found in public CI artifacts." >&2
            find .reachable/ci-artifacts \
              \( -name prompt.md -o -name bundle.json -o -name rules.json -o -path '*/ai-rules/*' \) \
              -print >&2
            exit 3
          fi
          echo "Private remediation bundle removed; only sanitized CI artifacts remain."

      - name: Select SARIF for GitHub code scanning
        if: always()
        run: |
          mkdir -p .reachable/ci-artifacts
          target=".reachable/ci-artifacts/reachable-code-scanning.sarif"
          if [ -f ".reachable/ci-artifacts/reachable-after-final.sarif" ]; then
            cp ".reachable/ci-artifacts/reachable-after-final.sarif" "$target"
            echo "Selected final proof SARIF for GitHub code scanning."
          elif find .reachable/ci-artifacts -maxdepth 1 -name 'reachable-after-batch-*.sarif' -print -quit | grep -q .; then
            latest="$(find .reachable/ci-artifacts -maxdepth 1 -name 'reachable-after-batch-*.sarif' -print | sort -V | tail -1)"
            cp "$latest" "$target"
            echo "Selected latest batch proof SARIF for GitHub code scanning: $latest"
          elif [ -f ".reachable/ci-artifacts/reachable.sarif" ]; then
            cp ".reachable/ci-artifacts/reachable.sarif" "$target"
            echo "Selected baseline SARIF for GitHub code scanning."
          else
            echo "No Reachable SARIF file was produced."
          fi
          if [ -f "$target" ]; then
            python3 ci/sanitize-sarif-for-upload.py "$target"
            echo "GitHub code scanning SARIF: $target"
          fi

      - name: Record final Reachable cache evidence
        if: always()
        env:
          REACHABLE_CACHE_PRIMARY_KEY: ${{ steps.reachable-cache.outputs.cache-primary-key }}
          REACHABLE_CACHE_MATCHED_KEY: ${{ steps.reachable-cache.outputs.cache-matched-key }}
          REACHABLE_CACHE_RESTORED: ${{ steps.reachable-cache.outputs.cache-matched-key != '' }}
          REACHABLE_CACHE_SOURCE: github-actions
        run: |
          python3 ci/reachable-cache-evidence.py after-scan

      - name: Build public Reachable Pages summary
        if: always() && inputs.remediate && !inputs.rescan_only
        run: |
          python ci/build-pages-summary.py \
            --sarif .reachable/ci-artifacts/reachable-code-scanning.sarif \
            --ledger .reachable/ci-artifacts/remediation-ledger.json \
            --out .reachable/ci-artifacts/pages

      - name: Summarize Reachable code scanning data
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from collections import Counter
          from pathlib import Path

          sarif = Path(".reachable/ci-artifacts/reachable-code-scanning.sarif")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          lines = [
              "## Reachable GitHub Dashboard",
              "",
              "Reachable publishes release-blocking compatibility rows to GitHub Code Scanning with SARIF category `reachable`.",
              "",
          ]

          if not sarif.exists():
              lines.extend([
                  "**SARIF:** not produced.",
                  "",
                  "No Reachable Code Scanning upload will run for this job.",
              ])
          else:
              data = json.loads(sarif.read_text(encoding="utf-8"))
              results = (data.get("runs") or [{}])[0].get("results") or []
              risks = Counter(str((item.get("properties") or {}).get("riskLevel") or "UNKNOWN").upper() for item in results)
              reachability = Counter(str((item.get("properties") or {}).get("reachabilityState") or "UNKNOWN").upper() for item in results)
              suspicious = sum(1 for item in results if str(item.get("ruleId") or "").upper().startswith("SUSPICIOUS/"))
              repo = os.environ.get("GITHUB_REPOSITORY", "")
              code_scanning_url = f"https://github.com/{repo}/security/code-scanning?query=category%3Areachable" if repo else ""

              lines.extend([
                  f"**SARIF:** `{sarif}`",
                  f"**Production actionable results:** `{len(results)}`",
                  f"**Defended / defendable:** `{reachability.get('DEFENDED', 0) + reachability.get('DEFENDABLE', 0)}`",
                  f"**Suspicious packages:** `{suspicious}`",
                  "",
                  "| Reachable risk | Count |",
                  "| --- | ---: |",
              ])
              for risk in ("CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"):
                  lines.append(f"| `{risk}` | {risks.get(risk, 0)} |")
              if code_scanning_url:
                  lines.extend([
                      "",
                      f"[Open Reachable Code Scanning alerts]({code_scanning_url})",
                  ])
              lines.extend([
                  "",
                  "If the upload step reports that GitHub Code Security or Advanced Security is disabled, the SARIF remains available in the workflow artifacts.",
              ])

          text = "\n".join(lines) + "\n"
          print(text)
          if summary_path:
              Path(summary_path).write_text(
                  (Path(summary_path).read_text(encoding="utf-8") if Path(summary_path).exists() else "") + text,
                  encoding="utf-8",
              )
          PY

      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reachable-remediation-artifacts
          if-no-files-found: ignore
          path: |
            .reachable/ci-artifacts/**

      - name: Save updated Reachable cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.reachable
          key: reachable-${{ runner.os }}-${{ github.repository_id }}-${{ env.REACHABLE_VERSION }}-${{ hashFiles('**/go.sum', '**/go.mod', '**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock', '**/requirements*.txt', '**/poetry.lock', '**/uv.lock', '**/Pipfile.lock', '**/Cargo.lock', '**/Gemfile.lock', '**/pom.xml', '**/build.gradle*', '**/*.csproj') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Configure results publishing to GitHub Pages
        if: always() && github.event_name != 'pull_request' && inputs.remediate && !inputs.rescan_only
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload results page artifact
        if: always() && github.event_name != 'pull_request' && inputs.remediate && !inputs.rescan_only
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .reachable/ci-artifacts/pages

      - name: Publish results to GitHub Pages
        id: publish-results
        if: always() && github.event_name != 'pull_request' && inputs.remediate && !inputs.rescan_only
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Upload Reachable SARIF to code scanning
        id: reachable-sarif-upload
        if: ${{ always() && hashFiles('.reachable/ci-artifacts/reachable-code-scanning.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .reachable/ci-artifacts/reachable-code-scanning.sarif
          category: reachable

      - name: Reachable code scanning upload status
        if: always()
        run: |
          if [ -f ".reachable/ci-artifacts/reachable-code-scanning.sarif" ]; then
            echo "Reachable SARIF upload outcome: ${{ steps.reachable-sarif-upload.outcome }}"
            {
              echo ""
              echo "### Reachable SARIF Upload"
              echo ""
              echo "- Upload outcome: \`${{ steps.reachable-sarif-upload.outcome }}\`"
              echo "- GitHub dashboard: https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=category%3Areachable"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Reachable SARIF upload skipped because no code-scanning SARIF was produced."
            {
              echo ""
              echo "### Reachable SARIF Upload"
              echo ""
              echo "- Upload outcome: \`skipped\`"
              echo "- Reason: no code-scanning SARIF file was produced."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
